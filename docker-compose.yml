version: '3.8'

# Container names use APP_SLUG to allow multiple apps to run simultaneously.
# Set APP_SLUG in your .env file to match cursive.json slug (default: boilerplate)

services:
  postgres:
    image: postgres:16.2
    container_name: ${APP_SLUG:-boilerplate}-postgres
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${APP_SLUG:-boilerplate}_dev
    volumes:
      - ${APP_SLUG:-boilerplate}_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${APP_SLUG:-boilerplate}-minio
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ${APP_SLUG:-boilerplate}_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: ${APP_SLUG:-boilerplate}-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/app-storage --ignore-existing;
      exit 0;
      "

volumes:
  boilerplate_postgres_data:
    name: ${APP_SLUG:-boilerplate}_postgres_data
  boilerplate_minio_data:
    name: ${APP_SLUG:-boilerplate}_minio_data
